# 1. Configuración de la Base de Datos (Asegúrate de que el nombre coincide con HeidiSQL)
spring.datasource.url=jdbc:mysql://localhost:3306/crm_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=  # SI PUSISTE CONTRASEÑA EN MYSQL, ESCRÍBELA AQUÍ

# 2. Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de Hibernate (ESTO ES LO QUE TE FALTA PARA CREAR LAS TABLAS)
# 'update' creará las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Puerto del Servidor (Cámbialo a 5000 para que coincida con tu App.jsx de React)
server.port=5000
